server.port=${SERVER_PORT:8080}
spring.application.name=CampusAura

# ── Firebase ──────────────────────────────────────────────────────────────────
# Local dev: reads from src/main/resources/ via classpath
# Docker:    overridden by FIREBASE_SERVICE_ACCOUNT_KEY env var pointing to /run/secrets/firebase-key
firebase.service-account-key=${FIREBASE_SERVICE_ACCOUNT_KEY:classpath:firebase-service-account.json}
firebase.database-url=${FIREBASE_DATABASE_URL:https://campusaura-12c16.firebaseio.com}

# ── Actuator (health endpoint for Docker/Azure probes) ────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── CORS ──────────────────────────────────────────────────────────────────────
# Comma-separated list of allowed frontend origins.
# Override via CORS_ALLOWED_ORIGINS environment variable in Docker/Azure.
# Add your Vercel URL to CORS_ALLOWED_ORIGINS in docker-compose.yml / Azure config once deployed.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175}
